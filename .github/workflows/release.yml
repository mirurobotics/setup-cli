name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:

  check-main:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check ancestry
        id: check
        run: |
          git fetch origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag is not on main — skipping release."
          fi

  release:
    needs: check-main
    if: needs.check-main.outputs.on_main == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate package.json version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(jq -r .version package.json)
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "::error::Tag version (v$TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "✓ Version validated: v$PKG_VERSION"

      - name: Update major and minor version tags
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          # Skip tag updates for prereleases (contains hyphen after version)
          if [[ "$VERSION" == *-* ]]; then
            echo "Skipping tag updates for prerelease: $VERSION"
            exit 0
          fi

          MAJOR=${VERSION%%.*}
          MINOR=${VERSION%.*}

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -fa "$MAJOR" -m "Update $MAJOR to $VERSION"
          git tag -fa "$MINOR" -m "Update $MINOR to $VERSION"
          git push origin "$MAJOR" "$MINOR" --force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            ${PRERELEASE_FLAG:+"$PRERELEASE_FLAG"}
